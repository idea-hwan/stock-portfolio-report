<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오 리포트 아카이브</title>
<style>
  :root {
    --bg:     #0d1117;
    --bg2:    #161b22;
    --bg3:    #21262d;
    --border: #30363d;
    --text:   #e6edf3;
    --muted:  #8b949e;
    --accent: #58a6ff;
    --buy:    #3fb950;
    --buy-bg: #0d2818;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 24px 16px 20px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  header p {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }
  .year-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin: 32px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .year-label:first-child { margin-top: 0; }
  .report-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .report-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
  }
  .report-card:hover {
    border-color: var(--accent);
    background: var(--bg3);
  }
  .report-card.latest {
    border-color: var(--buy);
    background: var(--buy-bg);
  }
  .report-card.latest:hover {
    border-color: #5de876;
  }
  .card-left { display: flex; align-items: center; gap: 12px; }
  .quarter-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg3);
    color: var(--muted);
    letter-spacing: 0.4px;
    white-space: nowrap;
  }
  .report-card.latest .quarter-badge {
    background: #0d3d1a;
    color: var(--buy);
  }
  .card-title { font-weight: 600; font-size: 14px; }
  .card-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .report-card.latest .card-sub { color: #5de876; opacity: 0.7; }
  .arrow { color: var(--muted); font-size: 14px; }
  .report-card.latest .arrow { color: var(--buy); }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 24px 16px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <h1>포트폴리오 리포트</h1>
  <p>대형 경기순환주 · 대형 밸류주 · 대형 성장주 · 중소형 성장주 — 분기별 아카이브</p>
</header>

<main>

  <div class="year-label">2025</div>
  <div class="report-list">
    <a class="report-card latest" href="2025Q4.html">
      <div class="card-left">
        <span class="quarter-badge">2025 Q4</span>
        <div>
          <div class="card-title">포트폴리오 리포트 2025Q4</div>
          <div class="card-sub">최신 · 경기순환 34 · 밸류 57 · 성장 19 · 중소형 52</div>
        </div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

</main>

<footer>
  <p>데이터 기준: 각 분기말 | 본 리포트는 투자 참고 자료이며 투자 권유가 아닙니다.</p>
</footer>

</body>
</html>
